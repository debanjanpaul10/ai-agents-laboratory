<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>{{ApplicationName}} Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
        }

        .header {
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

            .header h1 {
                margin: 0;
                font-size: 22px;
                color: #444;
            }

        .body {
            margin: 20px 0;
            line-height: 1.6;
        }

        .signature {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 15px;
            font-size: 14px;
            color: #555;
        }

        .app-brand {
            text-align: center;
            margin-top: 20px;
        }

            .app-brand img {
                max-width: 120px;
                display: block;
                margin: 0 auto 10px;
            }

            .app-brand span {
                font-weight: bold;
                font-size: 16px;
                color: #222;
            }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Subject -->
        <div class="header">
            <h1>{{Subject}}</h1>
        </div>

        <!-- Body Content -->
        <div class="body">
            <p>{{Message}}</p>
        </div>

        <!-- Signature -->
        <div class="signature">
            <p>Sent by: {{SenderAddress}}</p>
        </div>

        <!-- App Branding -->
        <div class="app-brand">
            <img src="https://storage.googleapis.com/ai-agents-laboratory-storage/common-documents/icon.png" alt="AI Agents Laboratory Logo" />
            <span>AI Agents Laboratory</span>
        </div>
    </div>
</body>
</html>
